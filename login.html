<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>Login</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">

  <!-- GOOGLE FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <div class="container">

    <h1>
      Welcome Back
    </h1>

    <!-- ================= LOGIN FORM ================= -->

    <form id="loginForm">

      <!-- EMAIL -->
      <input
        type="email"
        id="email"
        placeholder="Enter your email"
        required
      >

      <!-- PASSWORD -->
      <div class="password-wrapper">

        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          required
        >

        <span onclick="togglePassword()">
          👁️
        </span>

      </div>

      <!-- LOGIN BUTTON -->
      <button type="submit">
        Login
      </button>

      <!-- ================= FORGOT PASSWORD ================= -->

      <p class="forgot-link">

        <a href="forgot-password.html">
          Forgot Password?
        </a>

      </p>

    </form>

    <!-- REGISTER -->
    <p class="register-text">

      Don't have an account?

      <a href="register.html">
        Register
      </a>

    </p>

  </div>

  <!-- ================= TOAST ================= -->

  <div id="toast"></div>

  <!-- ================= LOGIN SCRIPT ================= -->

  <script src="js/login.js"></script>

</body>
</html>
