<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Reset Password</title>

  <!-- GOOGLE FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    /* ================= RESET ================= */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      background:
        linear-gradient(
          rgba(0,0,0,0.75),
          rgba(0,0,0,0.75)
        ),
        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    /* ================= CARD ================= */

    .login-container{
      width:100%;
      max-width:430px;
      background:rgba(20,20,20,0.95);
      padding:40px 35px;
      border-radius:20px;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.08);
      animation:fadeIn 0.5s ease;
    }

    /* ================= TITLE ================= */

    .login-container h2{
      text-align:center;
      color:#ffcc00;
      margin-bottom:30px;
      font-size:32px;
      font-weight:700;
    }

    /* ================= INPUTS ================= */

    .login-container input{
      width:100%;
      padding:15px;
      margin-bottom:18px;
      border:none;
      border-radius:12px;
      background:#2a2a2a;
      color:white;
      font-size:15px;
      outline:none;
      transition:0.3s;
    }

    .login-container input:focus{
      border:2px solid #ff6600;
      background:#1f1f1f;
    }

    .login-container input::placeholder{
      color:#bbb;
    }

    /* ================= BUTTON ================= */

    .login-container button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:linear-gradient(
        135deg,
        #ff6600,
        #ff9900
      );
      color:white;
      font-size:17px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      margin-top:5px;
    }

    .login-container button:hover{
      transform:translateY(-2px);
      opacity:0.95;
      box-shadow:
        0 6px 20px rgba(255,102,0,0.4);
    }

    /* ================= MESSAGE ================= */

    #message{
      margin-top:20px;
      text-align:center;
      color:#ffffff;
      font-size:15px;
      font-weight:500;
    }

    /* ================= BACK LINK ================= */

    .back-login{
      margin-top:25px;
      text-align:center;
    }

    .back-login a{
      color:#ffcc00;
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      transition:0.3s;
    }

    .back-login a:hover{
      color:#ffffff;
    }

    /* ================= ANIMATION ================= */

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* ================= RESPONSIVE ================= */

    @media(max-width:500px){

      .login-container{
        padding:30px 25px;
      }

      .login-container h2{
        font-size:26px;
      }
    }

  </style>

</head>

<body>

  <div class="login-container">

    <h2>
      🔐 Reset Password
    </h2>

    <!-- EMAIL -->
    <input
      type="email"
      id="email"
      placeholder="Enter your email"
    >

    <!-- NEW PASSWORD -->
    <input
      type="password"
      id="newPassword"
      placeholder="Enter new password"
    >

    <!-- BUTTON -->
    <button onclick="resetPassword()">
      Reset Password
    </button>

    <!-- MESSAGE -->
    <p id="message"></p>

    <!-- BACK -->
    <div class="back-login">

      <a href="login.html">
        ← Back to Login
      </a>

    </div>

  </div>

  <script>

    const API =
      "http://localhost:5000";

    async function resetPassword() {

      const email =
        document.getElementById("email").value;

      const newPassword =
        document.getElementById("newPassword").value;

      const message =
        document.getElementById("message");

      try {

        const response = await fetch(
          `${API}/api/auth/reset-password`,
          {
            method: "PUT",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              email,
              newPassword
            })
          }
        );

        const data =
          await response.json();

        message.innerText =
          data.message;

      } catch (error) {

        console.error(error);

        message.innerText =
          "Server error";
      }
    }

  </script>

</body>
</html>
